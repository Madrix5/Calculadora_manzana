<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <table>
        <tr>
            <td colspan="4">
                <input class = "inputStyle" type="text" placeholder="0">
            </td>
        </tr>
        <tr>
            <td><button class="lightButton">x!</button></td>
            <td><button class="lightButton">sin</button></td>
            <td><button class="lightButton">cos</button></td>
            <td><button class="lightButton">tan</button></td>
        </tr>
        <tr>
            <td><button class="lightButton">e</button></td>
            <td><button class="lightButton">sinh</button></td>
            <td><button class="lightButton">cosh</button></td>
            <td><button class="lightButton">tanh</button></td>
        </tr>
        <tr>
            <td><button class="lightButton">mc</button></td>
            <td><button class="lightButton">mr</button></td>
            <td><button class="lightButton">m+</button></td>
            <td><button class="lightButton">m-</button></td>
        </tr>
        <tr>
            <td><button class="lightButton">C</button></td>
            <td><button class="lightButton">+/-</button></td>
            <td><button class="lightButton">%</button></td>
            <td><button class="accentButton">&#247</button></td>
        </tr>
        <tr>
            <td><button class="darkButton">7</button></td>
            <td><button class="darkButton">8</button></td>
            <td><button class="darkButton">9</button></td>
            <td><button class="accentButton">X</button></td>
        </tr>
        <tr>
            <td><button class="darkButton">4</button></td>
            <td><button class="darkButton">5</button></td>
            <td><button class="darkButton">6</button></td>
            <td><button class="accentButton">-</button></td>
        </tr>
        <tr>
            <td><button class="darkButton">3</button></td>
            <td><button class="darkButton">2</button></td>
            <td><button class="darkButton">1</button></td>
            <td><button class="accentButton">+</button></td>
        </tr>
        <tr>
            <td colspan="2"><button class="ceroButton darkButton">0</button></td>
            <td><button class="darkButton">,</button></td>
            <td><button class="accentButton">=</button></td>
        </tr>
        <tr>
            <td><button class="accentButton">x&#178</button></td>
            <td><button class="accentButton">x&#179</button></td>
            <td><button class="accentButton">&pi;</button></td>
            <td><button class="accentButton">&radic;</button></td>
        </tr>
    </table>
</body>
</html>
